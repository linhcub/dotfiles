# =====================================================================
# DYNAMIC OPACITY SETTINGS
# =====================================================================

# Enable the ability to change opacity dynamically
dynamic_background_opacity yes

# Set the starting opacity level
background_opacity 0.5

# Keybindings to control opacity
# Press Ctrl + Shift + Up to increase opacity (make it darker/more solid)
map ctrl+shift+up set_background_opacity +0.05

# Press Ctrl + Shift + Down to decrease opacity (make it more transparent)
map ctrl+shift+down set_background_opacity -0.05

# Press Ctrl + Shift + Backspace to reset opacity to the default value (0.85)
map ctrl+shift+backspace set_background_opacity default
